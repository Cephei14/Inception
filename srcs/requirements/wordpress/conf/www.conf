[www]

; Pool name
user = www-data
group = www-data

; Listen on TCP port (so NGINX can reach it from another container)
listen = 0.0.0.0:9000

; Process management
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Clear environment (security)
clear_env = no